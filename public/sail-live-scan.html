<!DOCTYPE html>
<html>
<head>
    <title>LAB007 - LIVE SAIL SCANNER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            margin: 0 0 30px 0;
            padding: 0;
            position: relative;
            background: #f0f0f0;
        }

        .logo {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .upload-section {
            background: #fff;
            border: 3px solid #0066cc;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .upload-section h2 {
            margin: 0 0 10px 0;
            color: #0066cc;
        }
        .upload-section p {
            color: #666;
            margin: 10px 0;
        }
        .upload-section input[type="file"] {
            display: block;
            margin: 10px auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #f8f8f8;
            width: 80%;
            max-width: 400px;
        }
        .upload-section input[type="file"]:hover {
            background: #f0f0f0;
            border-color: #0066cc;
        }
        #preview {
            max-width: 100%;
            margin: 20px 0;
        }
        #results {
            white-space: pre-wrap;
            font-family: monospace;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .loading {
            display: none;
            color: #666;
            margin: 10px 0;
        }
        .sail-number {
            background: #e6f3ff;
            padding: 10px;
            border-left: 4px solid #0066cc;
            margin: 10px 0;
        }
        .section {
            margin: 20px 0;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .skipper-details {
            background: #f0f8ff;
            padding: 15px;
            margin-top: 10px;
            border-radius: 5px;
            border-left: 3px solid #0066cc;
        }
        .skipper-details h3 {
            margin: 0 0 10px 0;
            color: #0066cc;
        }
        .skipper-details p {
            margin: 5px 0;
        }
        .download-section {
            margin-top: 15px;
            text-align: center;
        }
        .download-section button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .download-section button:hover {
            background: #0052a3;
        }
        .no-skipper {
            color: #666;
            font-style: italic;
            margin-top: 10px;
        }
        .no-match {
            color: #666;
            font-size: 16px;
            font-style: italic;
        }
        .debug-panel {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }
        .debug-header {
            padding: 10px;
            background: #0066cc;
            color: white;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .debug-header h3 {
            margin: 0;
        }
        .debug-header label {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .debug-content {
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
        }
        .debug-section {
            margin-bottom: 20px;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .debug-section h4 {
            margin: 0 0 10px 0;
            color: #0066cc;
        }
        .debug-section pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }
        .highlight {
            background: #fff3cd;
            padding: 2px 4px;
            border-radius: 2px;
        }
        .processing-status {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-running {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .status-succeeded {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-failed {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .batch-actions {
            margin: 20px 0;
            padding: 15px;
            background: #f0f8ff;
            border-radius: 5px;
            text-align: center;
        }
        .download-all-btn {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .download-all-btn:hover {
            background: #0052a3;
        }
        .results-list {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }
        .result-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            background: white;
        }
        .sail-numbers-list {
            margin: 10px 0;
        }
        .sail-number-item {
            background: #f5f5f5;
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #0066cc;
        }
        .sailor-info {
            background: #e6f3ff;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }
        .file-actions {
            margin-top: 10px;
            text-align: right;
        }
        .batch-summary {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        .batch-progress {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            border: 1px solid #dee2e6;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #0066cc;
            width: 0%;
            transition: width 0.3s ease;
        }
        .result-card {
            position: relative;
            margin-bottom: 20px;
        }
        .processing-status {
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .status-waiting {
            background: #f8f9fa;
            color: #6c757d;
        }
        .status-processing {
            background: #fff3cd;
            color: #856404;
        }
        .status-complete {
            background: #d4edda;
            color: #155724;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .debug-toggle {
            margin: 10px 0;
            user-select: none;
        }
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background: #ffffff;
            border-top: 1px solid #dee2e6;
        }

        .footer img {
            max-height: 100px;
            width: auto;
            margin: 0 auto;
            display: block;
        }

        .content-wrapper {
            flex: 1;
            padding: 0 20px; /* Add padding to content wrapper */
        }

        @media (max-width: 768px) {
            /* Adjustments for mobile/tablet */
            .content-wrapper {
                padding: 0 15px; /* Reduced padding for smaller screens */
            }
        }

        .live-scan-banner {
            background: #28a745;
            color: white;
            text-align: center;
            padding: 10px;
            margin: 10px 0 20px 0;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .action-button {
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .action-button:disabled {
            background: #cccccc !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .video-container {
            position: relative;
            max-width: 640px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #video {
            display: block;
            width: 100%;
            background-color: #f0f0f0;
            min-height: 300px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="lovesailing-header.jpg" alt="LoveSailing Header" class="logo">
    </div>

    <div class="main-container">
        <div class="content-wrapper">
            <div class="live-scan-banner">
                LIVE SAIL NUMBER SCANNING
            </div>
            
            <div class="upload-section">
                <h2>Capture Sail Photo</h2>
                <div class="video-container" style="margin-bottom: 20px;">
                    <video id="video" style="max-width: 100%; border: 1px solid #ddd; border-radius: 5px;"></video>
                </div>
                <div class="button-row" style="margin: 15px 0;">
                    <button id="startCamera" class="action-button" style="background: #28a745; margin-right: 10px;">Start Camera</button>
                    <button id="startAutoScan" class="action-button" style="background: #0066cc; margin-right: 10px;">Start Auto Scan</button>
                    <button id="capturePhoto" class="action-button" style="background: #6c757d;">Manual Capture</button>
                    <button id="stopCamera" class="action-button" style="background: #dc3545; margin-left: 10px;">Stop All</button>
                </div>
                <div id="autoScanStatus" style="margin-top: 10px; font-weight: bold; color: #28a745; display: none;">
                    Auto-scanning active: <span id="scanTimer">30</span> seconds until next scan
                </div>
                <p style="margin-top: 20px;">Or upload from your device (for testing)</p>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="detection-log" style="margin-top: 30px; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; background: #f8f9fa;">
                <h2>Sail Number Detection Log</h2>
                <div class="log-controls" style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <button id="clearLog" class="action-button" style="background: #6c757d;">Clear Log</button>
                    </div>
                    <div>
                        <span id="detectionCounter" style="font-weight: bold;">0 detections</span>
                    </div>
                </div>
                <div id="sailNumberLog" style="max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; background: white; border-radius: 5px;">
                    <div class="log-placeholder" style="color: #6c757d; font-style: italic;">No sail numbers detected yet. Start camera and scanning to begin.</div>
                </div>
            </div>

            <!-- Remove or hide elements not needed for live monitoring -->
            <div id="topResultsBox" class="sail-number-display" style="display: none;">
                <h2>Results</h2>
                <div class="results-list"></div>
            </div>

            <div id="batchActions" class="batch-actions" style="display: none;">
                <button id="downloadAllBtn" class="download-all-btn">Download All Renamed Files</button>
                <div class="batch-summary"></div>
            </div>

            <img id="preview" style="display: none;">
            <div id="loading" class="loading" style="display: none;">Analyzing image...</div>

            <div id="results" style="display: none;"></div>
            <div id="sailNumberBox" class="sail-number-display" style="display: none;">
                <h2>Detected Sail Number</h2>
                <div class="sail-number-value">--</div>
                <div class="sail-number-confidence"></div>
            </div>

            <div id="debugPanel" class="debug-panel" style="display: none;">
                <!-- Debug content hidden by default -->
            </div>

            <div id="batchProgress" class="batch-progress" style="display: none;">
                <!-- Not needed for live monitoring -->
            </div>

            <div class="results-container" style="display: none;">
                <!-- Not needed for live monitoring -->
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://thomad99.wixstudio.com/lab007" target="_blank">
            <img src="LAB007-FOOTER.JPG" alt="LAB007 Footer">
        </a>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const topResultsBox = document.getElementById('topResultsBox');
        const topResultsContent = topResultsBox.querySelector('.top-results-content');
        const loading = document.getElementById('loading');
        const debugPanel = document.getElementById('debugPanel');
        const azureDebug = document.getElementById('azureDebug');
        const rawTextDebug = document.getElementById('rawTextDebug');
        const numberDebug = document.getElementById('numberDebug');
        const debugToggle = document.getElementById('debugToggle');
        const processingStatus = document.getElementById('processingStatus');
        const batchActions = document.getElementById('batchActions');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const resultsContainer = document.querySelector('.results-list');
        window.processedFiles = [];
        const batchProgress = document.getElementById('batchProgress');
        let totalFiles = 0;
        let completedFiles = 0;
        const RATE_LIMIT_DELAY = 26000; // 26 seconds to be safe
        let lastAzureCallTime = 0;

        debugToggle.addEventListener('change', (e) => {
            document.querySelector('.debug-content').style.display = e.target.checked ? 'block' : 'none';
        });

        imageInput.addEventListener('change', handleFiles);
        downloadAllBtn.addEventListener('click', downloadAllFiles);

        async function waitForRateLimit() {
            const now = Date.now();
            const timeSinceLastCall = now - lastAzureCallTime;
            
            if (timeSinceLastCall < RATE_LIMIT_DELAY) {
                const waitTime = RATE_LIMIT_DELAY - timeSinceLastCall;
                console.log(`Rate limit cooling down. Waiting ${waitTime/1000} seconds...`);
                await new Promise(resolve => setTimeout(resolve, waitTime));
            }
            lastAzureCallTime = Date.now();
        }

        async function handleFiles(e) {
            const files = Array.from(e.target.files);
            
            // Reset everything for a new batch
            window.processedFiles = [];
            resultsContainer.innerHTML = '';
            totalFiles = files.length;
            completedFiles = 0;
            
            console.log(`Starting to process ${totalFiles} files`);
            
            if (files.length > 0) {
                try {
                    // Call cleanup before starting new batch
                    const cleanupResponse = await fetch('/api/cleanup', {
                        method: 'POST'
                    });
                    
                    // Update UI to show we're starting
                    batchActions.style.display = 'block';
                    batchProgress.style.display = 'block';
                    updateBatchProgress();
                    
                    // Update the download button status
                    const processedCount = document.getElementById('processedCount');
                    if (processedCount) {
                        processedCount.innerHTML = `Processing ${totalFiles} file(s)...`;
                    }
                    
                    // Update download button text to indicate processing
                    const downloadButton = document.getElementById('mainDownloadAllBtn');
                    if (downloadButton) {
                        downloadButton.disabled = true;
                        downloadButton.textContent = `Processing ${totalFiles} file(s)...`;
                    }

                    // Create result cards for all files first
                    files.forEach(file => {
                        const resultCard = createResultCard(file);
                        resultsContainer.appendChild(resultCard);
                    });

                    // Process files sequentially with rate limiting
                    for (const file of files) {
                        await processFile(file);
                        completedFiles++;
                        updateBatchProgress();
                    }

                    console.log('All files processed.');
                    console.log('Final processedFiles array length:', window.processedFiles.length);
                    console.log('Files:', window.processedFiles.map(f => f.newFilename));
                    
                    updateBatchSummary();
                } catch (err) {
                    console.error('Error during file processing:', err);
                    alert('An error occurred while processing files. Please try again.');
                }
            }
        }

        function createResultCard(file) {
            const resultCard = document.createElement('div');
            resultCard.className = 'result-card';
            resultCard.id = `result-${file.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
            resultCard.innerHTML = `
                <h3>${file.name}</h3>
                <div class="processing-status status-waiting">Waiting to process...</div>
                <div class="content"></div>
            `;
            return resultCard;
        }

        function updateBatchProgress() {
            const progressCount = batchProgress.querySelector('.progress-count');
            const progressFill = batchProgress.querySelector('.progress-fill');
            const percentage = (completedFiles / totalFiles) * 100;
            
            progressCount.textContent = `${completedFiles}/${totalFiles} files complete`;
            progressFill.style.width = `${percentage}%`;
        }

        async function processFile(file) {
            const resultCard = document.getElementById(`result-${file.name.replace(/[^a-zA-Z0-9]/g, '_')}`);
            const statusDiv = resultCard.querySelector('.processing-status');
            const contentDiv = resultCard.querySelector('.content');
            
            try {
                statusDiv.className = 'processing-status status-processing';
                statusDiv.textContent = 'Analyzing image...';

                const formData = new FormData();
                formData.append('image', file);

                const response = await fetch('/api/scan', {
                    method: 'POST',
                    body: formData
                });

                let data;
                try {
                    data = await response.json();
                    console.log('Received data from server:', data);
                    
                    // Detailed logging of processedFiles from server
                    if (data && data.processedFiles) {
                        console.log(`Server returned ${data.processedFiles.length} processed files:`);
                        data.processedFiles.forEach((file, i) => {
                            console.log(`  ${i+1}. ${file.newFilename} (${file.downloadUrl})`);
                        });
                    } else {
                        console.warn('Server response missing processedFiles array');
                    }
                } catch (parseErr) {
                    console.error('Failed to parse server response:', parseErr);
                    console.error('Raw response text:', await response.text());
                    throw new Error('Invalid response from server');
                }
                
                // Check if we got a valid response with processedFiles
                if (!data || !data.processedFiles) {
                    console.warn('Server returned invalid data:', data);
                    data = {
                        success: true,
                        sailNumbers: { numbers: [] },
                        processedFiles: [],
                        error: 'Invalid or missing data from server'
                    };
                }

                // Always consider the scan "successful" even if we have errors
                // Extract data safely with defaults
                const sailNumbers = data.sailNumbers?.numbers || [];
                const dataProcessedFiles = data.processedFiles || [];
                
                console.log('Sail numbers:', sailNumbers);
                console.log('Processed files:', dataProcessedFiles);

                if (sailNumbers.length > 0) {
                    contentDiv.innerHTML = `
                        <div class="sail-numbers-list">
                            <h4>Detected Sail Numbers:</h4>
                            ${sailNumbers.map((sailData, index) => `
                                <div class="sail-number-item" style="margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                                    <div class="number" style="font-size: 1.2em; font-weight: bold;">
                                        Sail #${sailData.number} 
                                        <span style="font-size: 0.8em; color: #666;">
                                            (Confidence: ${(sailData.confidence * 100).toFixed(1)}%)
                                        </span>
                                    </div>
                                    ${sailData.skipperInfo ? `
                                        <div class="sailor-info" style="margin-top: 5px; color: #28a745;">
                                            <strong>Sailor:</strong> ${sailData.skipperInfo.sailorName}
                                        </div>
                                    ` : '<div class="no-sailor" style="color: #dc3545; margin-top: 5px;">No sailor information found</div>'}
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = `
                        <div class="no-numbers" style="color: #dc3545; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                            <div style="font-weight: bold;">No sail numbers detected</div>
                            <div style="margin-top: 5px; font-size: 0.9em;">File will be renamed with NOSAIL prefix</div>
                        </div>
                    `;
                }

                // Add files section separately (always show if files exist)
                if (dataProcessedFiles && dataProcessedFiles.length > 0) {
                    contentDiv.innerHTML += `
                        <div class="generated-files" style="margin-top: 20px;">
                            <h4>Generated Files:</h4>
                            ${dataProcessedFiles.map(file => `
                                <div class="file-item" style="margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                                    <div style="font-weight: bold;">
                                        ${file.sailNumber === 'NOSAIL' ? 'No Sail' : 'Sail #' + file.sailNumber}
                                        ${file.sailorName !== 'NONAME' ? ' - ' + file.sailorName : ''}
                                    </div>
                                    <div style="color: #666; margin: 5px 0;">${file.newFilename}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML += `
                        <div class="no-files" style="margin-top: 20px; color: #dc3545; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                            No files were generated
                        </div>
                    `;
                }

                // Always mark as complete, never as error
                statusDiv.className = 'processing-status status-complete';
                statusDiv.textContent = dataProcessedFiles.length > 0 
                    ? 'Analysis complete' 
                    : 'Processed with fallback';
                
                // Add files to the global processedFiles array - FIXED
                if (data.processedFiles && data.processedFiles.length > 0) {
                    console.log(`Server returned ${data.processedFiles.length} processed files`);
                    
                    // Process each file from the server response
                    for (const newFile of data.processedFiles) {
                        if (!newFile || !newFile.newFilename || !newFile.downloadUrl) {
                            console.warn('Skipping invalid file entry:', newFile);
                            continue;
                        }
                        
                        // Check if this file already exists in our global array
                        const existingIndex = window.processedFiles.findIndex(f => 
                            f.newFilename === newFile.newFilename);
                        
                        if (existingIndex !== -1) {
                            // Replace existing file with updated version
                            console.log(`Replacing existing file in global array: ${newFile.newFilename}`);
                            window.processedFiles[existingIndex] = newFile;
                        } else {
                            // Add new file to global array
                            console.log(`Adding new file to global array: ${newFile.newFilename}`);
                            window.processedFiles.push(newFile);
                        }
                    }
                    
                    console.log(`AFTER UPDATE: Global processedFiles array now has ${window.processedFiles.length} files`);
                    console.log('Current processedFiles:', window.processedFiles.map(f => f.newFilename));
                    
                    // Update the UI with new file count
                    updateBatchSummary();
                }

            } catch (err) {
                console.error(`Error processing file ${file.name}:`, err);
                
                // Even in case of error, create a fallback message
                contentDiv.innerHTML = `
                    <div class="error-message" style="padding: 10px; background: #f8f9fa; border-radius: 5px;">
                        <div style="color: #dc3545; font-weight: bold;">Processing encountered an issue</div>
                        <div style="margin-top: 5px; color: #666;">
                            File will be processed with NOSAIL fallback
                        </div>
                    </div>
                `;
                
                // Mark as complete with warning, not as error
                statusDiv.className = 'processing-status status-complete';
                statusDiv.textContent = 'Processed with fallback';
            }
        }

        function updateBatchSummary() {
            console.log('Updating batch summary...');
            console.log('Total completed files:', completedFiles);
            console.log('Current processedFiles length:', window.processedFiles.length);
            
            const summary = batchActions.querySelector('.batch-summary');
            const processedCount = document.getElementById('processedCount');
            const totalFiles = completedFiles; // Use the global completedFiles count
            const successCount = window.processedFiles.length;
            
            console.log(`Updating UI: ${successCount} files ready for download`);
            
            if (summary) {
                summary.innerHTML = `
                    <div>Processed ${totalFiles} file(s)</div>
                    <div>${successCount} files ready for download</div>
                `;
            }
            
            if (processedCount) {
                processedCount.innerHTML = `
                    ${successCount} files ready for download
                `;
                
                // Update the download button state
                const downloadButton = document.getElementById('mainDownloadAllBtn');
                if (downloadButton) {
                    console.log(`Updating download button: ${successCount} files available`);
                    downloadButton.disabled = successCount === 0;
                    if (successCount === 0) {
                        downloadButton.textContent = 'No files to download';
                    } else {
                        downloadButton.textContent = `Download ${successCount} Renamed File${successCount !== 1 ? 's' : ''}`;
                    }
                }
            }
        }

        async function downloadFile(url, filename) {
            try {
                console.log(`Attempting to download file: ${url}`);
                
                // Check if URL is valid
                if (!url || !url.startsWith('/')) {
                    console.error(`Invalid download URL: ${url}`);
                    throw new Error(`Invalid download URL`);
                }
                
                // Make absolute URL if needed
                const fullUrl = url.startsWith('http') ? url : window.location.origin + url;
                console.log(`Downloading from full URL: ${fullUrl}`);
                
                // Fetch the file with proper headers
                const response = await fetch(fullUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/octet-stream'
                    },
                    cache: 'no-store'
                });
                
                // Check for successful response
                if (!response.ok) {
                    console.error(`Download failed with status: ${response.status}`);
                    throw new Error(`Download failed with status ${response.status}`);
                }
                
                // Get the file content
                const blob = await response.blob();
                
                // Verify we got data
                if (!blob || blob.size === 0) {
                    console.error('Downloaded file is empty');
                    throw new Error('Downloaded file is empty');
                }
                
                console.log(`File downloaded successfully, size: ${blob.size} bytes, type: ${blob.type}`);
                
                // Create a download link
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = filename;
                a.style.display = 'none';
                
                // Add to document, click, and clean up
                document.body.appendChild(a);
                a.click();
                
                // Clean up
                setTimeout(() => {
                    URL.revokeObjectURL(downloadUrl);
                    document.body.removeChild(a);
                    console.log(`Download of ${filename} complete and link removed`);
                }, 100);
                
                return true;
            } catch (err) {
                console.error(`Download error for ${filename}:`, err);
                alert(`Error downloading ${filename}: ${err.message}`);
                return false;
            }
        }

        async function downloadAllFiles() {
            console.log("Download All clicked - processedFiles:", window.processedFiles);
            console.log("Current count:", window.processedFiles?.length || 0);
            
            // Get main download button
            const downloadButton = document.getElementById('mainDownloadAllBtn');
            const originalText = downloadButton.textContent;
            
            // Make sure we have files
            if (!window.processedFiles || window.processedFiles.length === 0) {
                console.warn('No files available to download');
                alert('No files available to download');
                return;
            }
            
            let filesProcessed = 0;
            let filesTotal = window.processedFiles.length;
            let successCount = 0;
            let retryQueue = [];  // For files that fail on first attempt
            
            try {
                // Update button state
                downloadButton.disabled = true;
                downloadButton.textContent = `Preparing downloads (0/${filesTotal})...`;
                
                // Display what we're about to download
                console.log(`Starting download of ${filesTotal} files:`);
                window.processedFiles.forEach((f, i) => {
                    console.log(`${i+1}. ${f.newFilename} (${f.downloadUrl})`);
                });
                
                // Process files one at a time
                for (let i = 0; i < window.processedFiles.length; i++) {
                    const file = window.processedFiles[i];
                    
                    if (!file || !file.downloadUrl || !file.newFilename) {
                        console.warn('Invalid file data, skipping:', file);
                        continue;
                    }
                    
                    console.log(`Downloading file ${i+1}/${filesTotal}: ${file.newFilename}`);
                    
                    try {
                        const success = await downloadFile(file.downloadUrl, file.newFilename);
                        if (success) {
                            successCount++;
                        } else {
                            // Add to retry queue
                            retryQueue.push(file);
                        }
                    } catch (fileErr) {
                        console.error(`Error downloading file ${file.newFilename}:`, fileErr);
                        // Add to retry queue
                        retryQueue.push(file);
                    }
                    
                    filesProcessed++;
                    downloadButton.textContent = `Downloading (${filesProcessed}/${filesTotal})...`;
                    
                    // Add small delay between downloads to prevent overwhelming the browser
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                // Retry any failed files once
                if (retryQueue.length > 0) {
                    downloadButton.textContent = `Retrying ${retryQueue.length} files...`;
                    
                    for (const file of retryQueue) {
                        try {
                            console.log(`Retrying download for: ${file.newFilename}`);
                            const success = await downloadFile(file.downloadUrl, file.newFilename);
                            if (success) {
                                successCount++;
                            }
                        } catch (retryErr) {
                            console.error(`Retry failed for ${file.newFilename}:`, retryErr);
                        }
                        
                        // Even shorter delay for retries
                        await new Promise(resolve => setTimeout(resolve, 200));
                    }
                }
                
                // Update the UI with final status - always positive
                const finalMessage = successCount === filesTotal
                    ? `Downloaded all ${successCount} files successfully!`
                    : `Downloaded ${successCount} of ${filesTotal} files`;
                    
                downloadButton.textContent = finalMessage;
                
                // Only show a message if we had significant issues
                if (successCount < filesTotal / 2) {
                    console.warn(`Only downloaded ${successCount} of ${filesTotal} files`);
                    // Instead of an alert that might alarm users, just log to console
                }
                
                // Reset button after a delay
                setTimeout(() => {
                    downloadButton.disabled = false;
                    downloadButton.textContent = originalText;
                }, 5000);
            } catch (err) {
                console.error('Batch download error:', err);
                // Don't show error alert, just update the button text
                downloadButton.textContent = 'Download issue - try again';
                
                setTimeout(() => {
                    downloadButton.disabled = false;
                    downloadButton.textContent = originalText;
                }, 3000);
            }
        }

        // Add a function to handle manual cleanup if needed
        async function manualCleanup() {
            try {
                const response = await fetch('/api/cleanup', {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    throw new Error('Cleanup failed');
                }
                
                const result = await response.json();
                console.log('Manual cleanup completed:', result);
            } catch (err) {
                console.error('Error during manual cleanup:', err);
            }
        }

        // Add function to download all versions
        async function downloadAllVersions(files) {
            for (const file of files) {
                await downloadFile(file.downloadUrl, file.newFilename);
                // Small delay between downloads
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        function toggleDebug(checkbox) {
            const debugPanel = document.getElementById('debugPanel');
            debugPanel.style.display = checkbox.checked ? 'block' : 'none';
        }

        // Live Camera Functionality
        const video = document.getElementById('video');
        const startCameraBtn = document.getElementById('startCamera');
        const stopCameraBtn = document.getElementById('stopCamera');
        const capturePhotoBtn = document.getElementById('capturePhoto');
        const startAutoScanBtn = document.getElementById('startAutoScan');
        const autoScanStatus = document.getElementById('autoScanStatus');
        const scanTimer = document.getElementById('scanTimer');
        const sailNumberLog = document.getElementById('sailNumberLog');
        const clearLogBtn = document.getElementById('clearLog');
        const detectionCounter = document.getElementById('detectionCounter');
        
        let stream = null;
        let autoScanInterval = null;
        let timerInterval = null;
        let secondsRemaining = 30;
        let detectionCount = 0;
        let detectedSailNumbers = [];

        // Initially disable buttons
        capturePhotoBtn.disabled = true;
        stopCameraBtn.disabled = true;
        startAutoScanBtn.disabled = true;
        
        // Start camera
        startCameraBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment', // Prefer back camera on mobile
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                video.play();
                
                // Update button states
                startCameraBtn.disabled = true;
                capturePhotoBtn.disabled = false;
                stopCameraBtn.disabled = false;
                startAutoScanBtn.disabled = false;
                
                console.log('Camera started successfully');
            } catch (err) {
                console.error('Error accessing camera:', err);
                alert('Could not access the camera. Please ensure you have granted camera permission.');
            }
        });

        // Stop camera and all scanning
        stopCameraBtn.addEventListener('click', () => {
            stopAllScanningActivities();
        });
        
        function stopAllScanningActivities() {
            // Stop auto-scanning if active
            if (autoScanInterval) {
                clearInterval(autoScanInterval);
                autoScanInterval = null;
            }
            
            // Stop timer if active
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            // Hide auto-scan status
            autoScanStatus.style.display = 'none';
            
            // Stop camera if active
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            
            // Reset button states
            startCameraBtn.disabled = false;
            capturePhotoBtn.disabled = true;
            stopCameraBtn.disabled = true;
            startAutoScanBtn.disabled = true;
            
            console.log('All scanning activities stopped');
        }

        // Clear the log
        clearLogBtn.addEventListener('click', () => {
            sailNumberLog.innerHTML = '<div class="log-placeholder" style="color: #6c757d; font-style: italic;">Log cleared. Scan results will appear here.</div>';
            detectionCount = 0;
            detectedSailNumbers = [];
            updateDetectionCounter();
        });
        
        // Start auto-scanning
        startAutoScanBtn.addEventListener('click', () => {
            if (!stream) {
                alert('Please start the camera first.');
                return;
            }
            
            // If already scanning, stop it
            if (autoScanInterval) {
                clearInterval(autoScanInterval);
                autoScanInterval = null;
                clearInterval(timerInterval);
                timerInterval = null;
                autoScanStatus.style.display = 'none';
                startAutoScanBtn.textContent = 'Start Auto Scan';
                console.log('Auto-scanning stopped');
                return;
            }
            
            // Start auto-scanning
            startAutoScanBtn.textContent = 'Stop Auto Scan';
            autoScanStatus.style.display = 'block';
            secondsRemaining = 30;
            scanTimer.textContent = secondsRemaining;
            
            // First capture immediately
            captureAndProcessImage();
            
            // Start timer to show countdown
            timerInterval = setInterval(() => {
                secondsRemaining--;
                scanTimer.textContent = secondsRemaining;
                
                if (secondsRemaining <= 0) {
                    secondsRemaining = 30;
                }
            }, 1000);
            
            // Set interval for auto-capture every 30 seconds
            autoScanInterval = setInterval(captureAndProcessImage, 30000);
            
            console.log('Auto-scanning started - capturing every 30 seconds');
        });

        // Manual capture
        capturePhotoBtn.addEventListener('click', () => {
            if (!stream) {
                alert('Please start the camera first.');
                return;
            }
            
            captureAndProcessImage();
        });
        
        // Capture and process image
        function captureAndProcessImage() {
            // Create a canvas to capture the photo
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            // Set canvas dimensions to match video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw the current video frame to the canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            try {
                // Convert to blob
                canvas.toBlob(async (blob) => {
                    // Create a file object from the blob
                    const timestamp = new Date();
                    const file = new File([blob], `live-scan-${timestamp.toISOString()}.jpg`, { type: 'image/jpeg' });
                    
                    console.log('Photo captured:', file.name);
                    
                    // Create a FormData object for the API request
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    // Process the image and add to log
                    await processImageAndLogResults(file, formData, timestamp);
                    
                }, 'image/jpeg', 0.95);
            } catch (err) {
                console.error('Error capturing photo:', err);
                addEntryToLog('Error capturing photo: ' + err.message, 'error');
            }
        }
        
        // Process image and log results
        async function processImageAndLogResults(file, formData, timestamp) {
            try {
                // Send to server for processing
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`Server responded with status ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Server response:', data);
                
                // Check if we have sail numbers
                if (data.sailNumbers && data.sailNumbers.numbers && data.sailNumbers.numbers.length > 0) {
                    // Log each detected sail number
                    for (const sailData of data.sailNumbers.numbers) {
                        const sailNumber = sailData.number;
                        const confidence = sailData.confidence;
                        const skipperInfo = sailData.skipperInfo;
                        
                        // Store the detection with timestamp
                        detectedSailNumbers.push({
                            timestamp: timestamp,
                            sailNumber: sailNumber,
                            confidence: confidence,
                            skipperInfo: skipperInfo
                        });
                        
                        // Add to visual log
                        addSailNumberToLog(sailNumber, confidence, skipperInfo, timestamp);
                        
                        // Save to database
                        await saveSailNumberToDatabase(sailNumber, confidence);
                    }
                } else {
                    // No sail numbers found
                    addEntryToLog(`No sail numbers detected (${timestamp.toLocaleTimeString()})`, 'info');
                }
                
                // Update the detection counter
                updateDetectionCounter();
                
            } catch (err) {
                console.error('Error processing image:', err);
                addEntryToLog('Error processing image: ' + err.message, 'error');
            }
        }
        
        // Add a sail number entry to the log
        function addSailNumberToLog(sailNumber, confidence, skipperInfo, timestamp) {
            // Remove placeholder if it exists
            const placeholder = sailNumberLog.querySelector('.log-placeholder');
            if (placeholder) {
                placeholder.remove();
            }
            
            // Create log entry
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.style.margin = '10px 0';
            logEntry.style.padding = '10px';
            logEntry.style.borderLeft = '4px solid #28a745';
            logEntry.style.backgroundColor = '#f8f9fa';
            
            // Format timestamp
            const timeString = timestamp.toLocaleTimeString();
            const dateString = timestamp.toLocaleDateString();
            
            // Create entry content
            let entryContent = `
                <div style="display: flex; justify-content: space-between;">
                    <span style="font-weight: bold;">Sail #${sailNumber}</span>
                    <span style="color: #666;">${timeString} ${dateString}</span>
                </div>
                <div style="margin-top: 5px; font-size: 0.9em;">
                    Confidence: ${(confidence * 100).toFixed(1)}%
                </div>
            `;
            
            // Add skipper info if available
            if (skipperInfo) {
                entryContent += `
                    <div style="margin-top: 5px; padding: 5px; background: #e6f3ff; border-radius: 4px;">
                        <strong>Sailor:</strong> ${skipperInfo.sailorName}
                    </div>
                `;
            }
            
            logEntry.innerHTML = entryContent;
            
            // Add to the top of the log
            sailNumberLog.insertBefore(logEntry, sailNumberLog.firstChild);
            
            // Increment detection count
            detectionCount++;
        }
        
        // Add a generic entry to the log
        function addEntryToLog(message, type = 'info') {
            // Remove placeholder if it exists
            const placeholder = sailNumberLog.querySelector('.log-placeholder');
            if (placeholder) {
                placeholder.remove();
            }
            
            // Create log entry
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.style.margin = '10px 0';
            logEntry.style.padding = '10px';
            
            // Style based on type
            if (type === 'error') {
                logEntry.style.borderLeft = '4px solid #dc3545';
                logEntry.style.backgroundColor = '#f8d7da';
            } else {
                logEntry.style.borderLeft = '4px solid #6c757d';
                logEntry.style.backgroundColor = '#f8f9fa';
            }
            
            // Current time
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            
            // Create entry content
            logEntry.innerHTML = `
                <div style="display: flex; justify-content: space-between;">
                    <span>${message}</span>
                    <span style="color: #666;">${timeString}</span>
                </div>
            `;
            
            // Add to the top of the log
            sailNumberLog.insertBefore(logEntry, sailNumberLog.firstChild);
        }
        
        // Update detection counter
        function updateDetectionCounter() {
            detectionCounter.textContent = `${detectionCount} detection${detectionCount !== 1 ? 's' : ''}`;
        }
        
        // Save sail number to database
        async function saveSailNumberToDatabase(sailNumber, confidence) {
            try {
                const response = await fetch('/api/numbers', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        numbers: [sailNumber]
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Failed to save to database: ${response.status}`);
                }
                
                const result = await response.json();
                console.log('Saved to database:', result);
                
            } catch (err) {
                console.error('Error saving to database:', err);
            }
        }

        // Handle mobile rotation and resize
        window.addEventListener('resize', () => {
            if (stream) {
                // Adjust video display as needed
            }
        });
    </script>
