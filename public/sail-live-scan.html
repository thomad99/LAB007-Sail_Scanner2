<!DOCTYPE html>
<html>

<head>
    <title>Live Sail Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <script src="script.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            margin: 0 0 30px 0;
            padding: 0;
            position: relative;
            background: #f0f0f0;
        }

        .logo {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .camera-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: center;
        }

        .camera-feed,
        .snapshot-preview {
            flex: 1;
            max-width: 500px;
        }

        .camera-feed {
            border: 2px solid #0066cc;
            border-radius: 10px;
            padding: 10px;
        }

        .snapshot-preview {
            border: 2px solid #28a745;
            border-radius: 10px;
            padding: 10px;
        }

        .preview-header {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        #video,
        #snapshotCanvas {
            width: 100%;
            border-radius: 5px;
        }

        #canvas {
            display: none;
        }

        .button-group {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background: #0052a3;
        }

        #stopBtn {
            background: #dc3545;
        }

        #stopBtn:hover {
            background: #c82333;
        }

        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #result {
            white-space: pre-wrap;
            font-family: monospace;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        #debug {
            display: none;
            white-space: pre-wrap;
            font-family: monospace;
            background: #e6f3ff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #0066cc;
            line-height: 1.5;
        }

        .debug-message {
            padding: 5px 0;
            border-bottom: 1px solid #cce5ff;
        }

        .debug-timestamp {
            color: #666;
            font-size: 0.9em;
            margin-right: 10px;
        }

        .debug-status {
            font-weight: bold;
        }

        .status-box {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .status-scanning {
            background: #e6f3ff;
            border-left: 4px solid #0066cc;
        }

        .status-success {
            background: #e6ffe6;
            border-left: 4px solid #2d8a2d;
        }

        .status-error {
            background: #ffe6e6;
            border-left: 4px solid #cc0000;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.5;
        }

        .error-message {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message::before {
            content: "⚠️";
            font-size: 20px;
        }

        .retry-countdown {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .confidence-high {
            color: #2d8a2d;
        }

        .confidence-medium {
            color: #b37400;
        }

        .confidence-low {
            color: #cc0000;
        }

        .sail-number-display {
            background: #fff;
            border: 3px solid #0066cc;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .sail-number-display h2 {
            margin: 0 0 10px 0;
            color: #0066cc;
        }

        .sail-number-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
            font-family: monospace;
        }

        .sail-number-confidence {
            font-size: 14px;
            color: #666;
        }

        .confidence-indicator {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            margin-left: 5px;
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.1s ease-out;
        }

        .flash-overlay.active {
            opacity: 0.7;
        }

        .top-results-content {
            font-size: 24px;
            font-family: monospace;
            margin: 15px 0;
            padding: 10px;
        }

        .top-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #eee;
            margin: 5px 0;
        }

        .top-result-number {
            font-size: 32px;
            font-weight: bold;
        }

        .top-result-confidence {
            font-size: 16px;
            color: #666;
        }

        .result-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skipper-info {
            color: #0066cc;
            font-size: 18px;
        }

        .no-match {
            color: #666;
            font-size: 16px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="lovesailing-header.jpg" alt="LoveSailing Header" class="logo">
    </div>

    <div class="container">
        <div class="camera-container">
            <div class="camera-feed">
                <div class="preview-header">Live Camera Feed</div>
                <video id="video" playsinline></video>
                <canvas id="processingCanvas" style="display: none;"></canvas>
            </div>
            <div class="snapshot-preview">
                <div class="preview-header">Last Snapshot</div>
                <canvas id="snapshotCanvas"></canvas>
            </div>
        </div>

        <div class="button-group">
            <button id="startBtn">Start Scanning</button>
            <button id="stopBtn">Stop</button>
            <label class="debug-toggle">
                <input type="checkbox" id="debugMode"> Show Debug Info
            </label>
        </div>

        <div id="topResultsBox" class="sail-number-display">
            <h2>Top Results</h2>
            <div class="top-results-content">Awaiting scan...</div>
        </div>

        <div id="result" class="status-box status-scanning">Waiting to start...</div>
        <div id="debug"></div>
    </div>

    <!-- Training Modal -->
    <div id="trainingModal" style="display: none;">
        <div style="background: white; max-width: 600px; margin: 50px auto; padding: 20px; border-radius: 10px;">
            <h2>Training Mode</h2>
            <p>Upload an image and enter the correct sail number:</p>
            <input type="file" id="trainImage" accept="image/*" style="margin: 10px 0;">
            <br>
            <input type="text" id="correctNumber" placeholder="Enter correct sail number"
                style="margin: 10px 0; padding: 5px;">
            <br>
            <canvas id="trainCanvas" style="max-width: 100%; margin: 10px 0;"></canvas>
            <br>
            <button onclick="submitTraining()">Submit</button>
            <button onclick="document.getElementById('trainingModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        let isScanning = false;
        let videoStream = null;

        // Initialize the application
        async function init() {
            const video = document.getElementById('video');
            const processingCanvas = document.getElementById('processingCanvas');
            const snapshotCanvas = document.getElementById('snapshotCanvas');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const resultDiv = document.getElementById('result');
            const debugCheckbox = document.getElementById('debugMode');
            const debugDiv = document.getElementById('debug');

            startBtn.addEventListener('click', startScanning);
            stopBtn.addEventListener('click', stopScanning);

            debugCheckbox.addEventListener('change', (e) => {
                debugDiv.classList.toggle('visible', e.target.checked);
            });

            video.addEventListener('play', () => {
                console.log('Video started playing');
            });

            video.addEventListener('error', (e) => {
                console.error('Video error:', e);
                resultDiv.textContent = 'Video error: ' + (video.error ? video.error.message : 'unknown error');
            });

            async function startScanning() {
                try {
                    resultDiv.textContent = 'Starting camera...';
                    console.log('Requesting camera access...');

                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('Camera API is not supported in this browser');
                    }

                    const constraints = {
                        video: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    };

                    console.log('Camera constraints:', constraints);
                    videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                    console.log('Camera access granted');

                    video.srcObject = videoStream;

                    await new Promise((resolve) => {
                        video.onloadedmetadata = () => {
                            console.log('Video metadata loaded');
                            video.play();
                            resolve();
                        };
                    });

                    resultDiv.textContent = 'Camera started. Waiting 3 seconds to stabilize...';
                    await new Promise(resolve => setTimeout(resolve, 3000));

                    isScanning = true;
                    resultDiv.textContent = 'Starting first scan...';
                    scanFrame();
                } catch (err) {
                    console.error('Error accessing camera:', err);
                    resultDiv.textContent = 'Error accessing camera: ' + err.message +
                        '. Please ensure you have granted camera permissions.';
                }
            }

            function stopScanning() {
                isScanning = false;
                if (videoStream) {
                    videoStream.getTracks().forEach(track => track.stop());
                }
                video.srcObject = null;
                resultDiv.textContent = 'Scanning stopped';
            }

            function addDebugMessage(message, status = '') {
                const debugDiv = document.getElementById('debug');
                const timestamp = new Date().toLocaleTimeString();
                const messageDiv = document.createElement('div');
                messageDiv.className = 'debug-message';
                messageDiv.innerHTML = `
                    <span class="debug-timestamp">[${timestamp}]</span>
                    <span class="debug-status">${status}</span>
                    ${message}
                `;
                debugDiv.insertBefore(messageDiv, debugDiv.firstChild);

                // Keep only last 50 messages
                const messages = debugDiv.getElementsByClassName('debug-message');
                while (messages.length > 50) {
                    debugDiv.removeChild(messages[messages.length - 1]);
                }
            }

            async function scanFrame() {
                if (!isScanning) return;

                try {
                    // Get both canvases
                    const processingCanvas = document.getElementById('processingCanvas');
                    const snapshotCanvas = document.getElementById('snapshotCanvas');

                    if (!processingCanvas || !snapshotCanvas) {
                        throw new Error('Canvas elements not found');
                    }

                    // Setup contexts
                    const processingContext = processingCanvas.getContext('2d');
                    const snapshotContext = snapshotCanvas.getContext('2d');

                    if (!processingContext || !snapshotContext) {
                        throw new Error('Could not get canvas contexts');
                    }

                    // Set dimensions for both canvases
                    processingCanvas.width = video.videoWidth;
                    processingCanvas.height = video.videoHeight;
                    snapshotCanvas.width = video.videoWidth;
                    snapshotCanvas.height = video.videoHeight;

                    // Draw the current frame to both canvases
                    processingContext.drawImage(video, 0, 0, processingCanvas.width, processingCanvas.height);
                    snapshotContext.drawImage(video, 0, 0, snapshotCanvas.width, snapshotCanvas.height);

                    addDebugMessage('Capture taken', '📸');
                    resultDiv.textContent = 'Capturing image and sending to server...';

                    // Convert processing canvas to blob for sending to server
                    const blob = await new Promise(resolve => {
                        processingCanvas.toBlob(resolve, 'image/jpeg', 0.95);
                    });

                    if (!blob) {
                        throw new Error('Failed to create image blob');
                    }

                    // Create a file from the blob with a timestamp
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                    const file = new File([blob], `scan-${timestamp}.jpg`, { type: 'image/jpeg' });

                    // Send to backend for processing
                    const formData = new FormData();
                    formData.append('image', file);

                    addDebugMessage('Sending image to Azure Vision...', '🚀');
                    const response = await fetch('/api/scan', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    addDebugMessage('Waiting for Azure feedback...', '⏳');
                    resultDiv.textContent = 'Processing results...';
                    const data = await response.json();

                    if (!data.success) {
                        throw new Error(data.error || 'Failed to process image');
                    }

                    addDebugMessage('Results received from Azure', '✅');

                    // Update top results box with numbers and skipper info
                    const topResultsBox = document.getElementById('topResultsBox');
                    if (data.sailNumbers && data.sailNumbers.numbers && data.sailNumbers.numbers.length > 0) {
                        addDebugMessage(`Found ${data.sailNumbers.numbers.length} sail numbers`, '🔍');
                        topResultsBox.querySelector('.top-results-content').innerHTML =
                            data.sailNumbers.numbers.map(result => `
                                <div class="top-result-item">
                                    <div class="result-info">
                                        <span class="top-result-number">${result.number}</span>
                                        ${result.skipperInfo ?
                                    `<span class="skipper-info">${result.skipperInfo.sailorName || ''}</span>` :
                                    '<span class="no-match">(No Sailor Match)</span>'
                                }
                                    </div>
                                    <span class="top-result-confidence ${getConfidenceClass(result.confidence)}">
                                        ${(result.confidence * 100).toFixed(1)}%
                                    </span>
                                </div>
                            `).join('');
                    } else {
                        addDebugMessage('No sail numbers detected', '❌');
                        topResultsBox.querySelector('.top-results-content').textContent = 'No numbers detected';
                    }

                    // Show detailed debug information if enabled
                    if (debugCheckbox.checked) {
                        addDebugMessage('Full Azure Response:', '📊');
                        addDebugMessage(JSON.stringify(data.debug, null, 2));
                    }

                    resultDiv.textContent = 'Scan complete. Waiting for next scan...';
                    addDebugMessage('Waiting for next scan...', '⏲️');

                } catch (err) {
                    console.error('Scan error:', err);
                    addDebugMessage(`Error: ${err.message}`, '❌');
                    resultDiv.textContent = 'Scan error: ' + err.message;
                }

                // Wait 15 seconds before next scan
                if (isScanning) {
                    resultDiv.textContent += '\nWaiting 15 seconds before next scan...';
                    await new Promise(resolve => setTimeout(resolve, 15000));
                    scanFrame();
                }
            }
        }

        function getConfidenceClass(confidence) {
            if (confidence >= 0.9) return 'confidence-high';
            if (confidence >= 0.7) return 'confidence-medium';
            return 'confidence-low';
        }

        // Start the application when the page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
