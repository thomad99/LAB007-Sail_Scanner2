<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LiveView - Sail Number Detection | Love Sailing</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta property="og:title" content="LiveView - Sail Number Detection - Love Sailing">
    <meta property="og:description" content="Live camera view with real-time sail number detection.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lovesailing.ai/LiveView.html">
    <meta property="og:image" content="https://lovesailing.ai/Images/LOVE%20SAILING%20LOGO.JPEG">
    <meta property="og:image:alt" content="Love Sailing Logo">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LiveView - Sail Number Detection - Love Sailing">
    <meta name="twitter:description" content="Live camera view with real-time sail number detection.">
    <meta name="twitter:image" content="https://lovesailing.ai/Images/LOVE%20SAILING%20LOGO.JPEG">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow-x: hidden; background: #0a0a12; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; }
        .header { width: 100%; padding: 12px 16px; background: #12121f; border-bottom: 1px solid #2a2a3e; }
        .header a { color: #7eb8ff; text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .view-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            max-height: 70vh;
        }
        #video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #captureCanvas { display: none; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .toggle-btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .toggle-btn:active { transform: scale(0.98); }
        .toggle-btn.off {
            background: #2a2a3e;
            color: #a0a0b0;
        }
        .toggle-btn.off:hover { background: #35354a; }
        .toggle-btn.on {
            background: #0066cc;
            color: #fff;
        }
        .toggle-btn.on:hover { background: #0052a3; }
        .status {
            font-size: 14px;
            color: #888;
        }
        .status.scanning { color: #7eb8ff; }
        .status.error { color: #e07070; }
        .hint { margin-top: 12px; font-size: 13px; color: #666; text-align: center; }
        .error-msg { margin-top: 12px; padding: 12px; background: rgba(200,80,80,0.15); border-radius: 8px; color: #e07070; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← Love Sailing</a>
    </div>
    <div class="container">
        <h1>LiveView</h1>
        <p>Point your camera at a sail. Turn <strong>Detection ON</strong> to scan for sail numbers every 2 seconds; matches appear as an overlay.</p>
        <div class="view-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
            <canvas id="captureCanvas"></canvas>
        </div>
        <div class="controls">
            <button type="button" id="detectionBtn" class="toggle-btn off" aria-pressed="false">Detection OFF</button>
            <span id="status" class="status"></span>
        </div>
        <p id="hint" class="hint">Detection is OFF. Click the button to start scanning for sail numbers.</p>
        <div id="errorMsg" class="error-msg"></div>
    </div>
    <script>
(function () {
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const captureCanvas = document.getElementById('captureCanvas');
    const detectionBtn = document.getElementById('detectionBtn');
    const statusEl = document.getElementById('status');
    const hintEl = document.getElementById('hint');
    const errorMsgEl = document.getElementById('errorMsg');

    let stream = null;
    let detectionOn = false;
    let scanInterval = null;
    let lastSailNumbers = [];

    function showError(msg) {
        errorMsgEl.textContent = msg || '';
        errorMsgEl.style.display = msg ? 'block' : 'none';
    }

    function setStatus(text, className) {
        statusEl.textContent = text || '';
        statusEl.className = 'status' + (className ? ' ' + className : '');
    }

    function resizeOverlay() {
        if (!video.clientWidth || !video.clientHeight) return;
        overlay.width = video.clientWidth;
        overlay.height = video.clientHeight;
        drawOverlay();
    }

    function boxFromBounding(b) {
        if (!b || b.length < 8) return null;
        const minX = Math.min(b[0], b[2], b[4], b[6]);
        const minY = Math.min(b[1], b[3], b[5], b[7]);
        const maxX = Math.max(b[0], b[2], b[4], b[6]);
        const maxY = Math.max(b[1], b[3], b[5], b[7]);
        return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }

    function drawOverlay() {
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        if (!lastSailNumbers.length || !video.videoWidth) return;
        const scaleX = overlay.width / video.videoWidth;
        const scaleY = overlay.height / video.videoHeight;
        for (const s of lastSailNumbers) {
            const box = boxFromBounding(s.boundingBox);
            if (!box) continue;
            const x = box.x * scaleX;
            const y = box.y * scaleY;
            const w = box.width * scaleX;
            const h = box.height * scaleY;
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.9)';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = 'rgba(0, 200, 255, 0.25)';
            ctx.fillRect(x, y, w, h);
            ctx.font = 'bold ' + Math.max(14, Math.min(24, w / 2)) + 'px sans-serif';
            ctx.fillStyle = '#00d4ff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            const text = String(s.number);
            const tx = x + 4;
            const ty = y + h - 4;
            ctx.strokeText(text, tx, ty);
            ctx.fillText(text, tx, ty);
        }
    }

    function doScan() {
        if (!stream || !video.videoWidth || !detectionOn) return;
        const w = video.videoWidth;
        const h = video.videoHeight;
        captureCanvas.width = w;
        captureCanvas.height = h;
        const ctx = captureCanvas.getContext('2d');
        ctx.drawImage(video, 0, 0, w, h);
        setStatus('Scanning…', 'scanning');
        captureCanvas.toBlob(function (blob) {
            if (!blob || !detectionOn) return;
            const fd = new FormData();
            fd.append('image', blob, 'frame.jpg');
            fetch('/api/liveview-scan', { method: 'POST', body: fd })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!detectionOn) return;
                    const list = data.sailNumbers || [];
                    lastSailNumbers = list;
                    resizeOverlay();
                    if (list.length) setStatus('Found ' + list.length + ' sail number(s)', '');
                    else setStatus('', '');
                    showError('');
                })
                .catch(function (err) {
                    if (!detectionOn) return;
                    setStatus('', 'error');
                    showError('Scan failed: ' + (err.message || 'Network error'));
                });
        }, 'image/jpeg', 0.9);
    }

    function startCamera() {
        return navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
    }

    function startDetection() {
        if (detectionOn) return;
        detectionOn = true;
        detectionBtn.textContent = 'Detection ON';
        detectionBtn.classList.remove('off');
        detectionBtn.classList.add('on');
        detectionBtn.setAttribute('aria-pressed', 'true');
        hintEl.textContent = 'Scanning every 2 seconds. Point the camera at a sail.';
        lastSailNumbers = [];
        resizeOverlay();
        doScan();
        scanInterval = setInterval(doScan, 2000);
    }

    function stopDetection() {
        detectionOn = false;
        if (scanInterval) {
            clearInterval(scanInterval);
            scanInterval = null;
        }
        detectionBtn.textContent = 'Detection OFF';
        detectionBtn.classList.add('off');
        detectionBtn.classList.remove('on');
        detectionBtn.setAttribute('aria-pressed', 'false');
        setStatus('');
        hintEl.textContent = 'Detection is OFF. Click the button to start scanning for sail numbers.';
        lastSailNumbers = [];
        resizeOverlay();
        showError('');
    }

    detectionBtn.addEventListener('click', function () {
        if (detectionOn) stopDetection();
        else startDetection();
    });

    window.addEventListener('resize', resizeOverlay);

    startCamera()
        .then(function (s) {
            stream = s;
            video.srcObject = s;
            video.onloadedmetadata = function () {
                video.play().catch(function () {});
                resizeOverlay();
            };
        })
        .catch(function (err) {
            showError('Camera access failed: ' + (err.message || 'Permission denied'));
        });
})();
    </script>
</body>
</html>
