<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LiveView - Sail Number Detection | Love Sailing</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta property="og:title" content="LiveView - Sail Number Detection - Love Sailing">
    <meta property="og:description" content="Live camera view with real-time sail number detection.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lovesailing.ai/LiveView.html">
    <meta property="og:image" content="https://lovesailing.ai/Images/LOVE%20SAILING%20LOGO.JPEG">
    <meta property="og:image:alt" content="Love Sailing Logo">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LiveView - Sail Number Detection - Love Sailing">
    <meta name="twitter:description" content="Live camera view with real-time sail number detection.">
    <meta name="twitter:image" content="https://lovesailing.ai/Images/LOVE%20SAILING%20LOGO.JPEG">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a12; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; }
        .header { flex-shrink: 0; padding: 10px 16px; background: #12121f; border-bottom: 1px solid #2a2a3e; }
        .header a { color: #7eb8ff; text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        .container { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 10px; }
        .view-wrapper {
            position: relative;
            flex: 0 0 auto;
            width: 100%;
            height: 60vh;
            max-height: 60vh;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }
        .view-wrapper .inner { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
        #video { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
        #overlay { pointer-events: none; }
        #captureCanvas { display: none; }
        .controls { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 10px 0; }
        .toggle-btn {
            flex: 1;
            padding: 14px 10px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .toggle-btn:active { transform: scale(0.98); }
        .toggle-btn.off { background: #2a2a3e; color: #a0a0b0; }
        .toggle-btn.off:hover { background: #35354a; }
        .toggle-btn.on { background: #0066cc; color: #fff; }
        .toggle-btn.on:hover { background: #0052a3; }
        .toggle-btn.start { background: #1a7a3a; color: #fff; }
        .toggle-btn.start:hover { background: #22963f; }
        .toggle-btn.stop { background: #cc2200; color: #fff; }
        .toggle-btn.stop:hover { background: #e02a00; }
        .feedback { flex: 1 1 0; min-height: 0; width: 100%; overflow: hidden; display: flex; flex-direction: column; background: #12121f; border: 1px solid #2a2a3e; border-radius: 10px; padding: 12px 14px; font-size: 14px; line-height: 1.6; }
        .feedback-line { color: #888; }
        .feedback-line.active { color: #7eb8ff; }
        .feedback-line.done { color: #a0a0b0; }
        .feedback-line.error { color: #e07070; }
        .feedback-status { margin-bottom: 8px; flex-shrink: 0; }
        .feedback-history { flex: 1 1 0; min-height: 0; overflow-y: auto; font-size: 12px; color: #888; }
        .feedback-history-title { color: #a0a0b0; margin-bottom: 4px; flex-shrink: 0; }
        .feedback-history-item { margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← Love Sailing</a>
    </div>
    <div class="container">
        <div class="view-wrapper">
            <div class="inner">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="overlay"></canvas>
            </div>
        </div>
        <canvas id="captureCanvas"></canvas>
        <div class="controls">
            <button type="button" id="detectionBtn" class="toggle-btn start" aria-pressed="false">▶ Start</button>
            <button type="button" id="storeCapturesBtn" class="toggle-btn off" aria-pressed="false">Save Captures OFF</button>
        </div>
        <div id="feedback" class="feedback">
            <div id="feedbackStatus" class="feedback-status feedback-line">—</div>
            <div class="feedback-history-title">Last stored</div>
            <div id="feedbackHistory" class="feedback-history"></div>
        </div>
    </div>
    <script>
(function () {
    if (!window.matchMedia('(max-width: 768px)').matches) {
        window.location.replace('/');
        return;
    }
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const captureCanvas = document.getElementById('captureCanvas');
    const detectionBtn = document.getElementById('detectionBtn');
    const storeCapturesBtn = document.getElementById('storeCapturesBtn');
    const feedbackStatus = document.getElementById('feedbackStatus');
    const feedbackHistory = document.getElementById('feedbackHistory');

    const THROTTLE_MS = 10000;
    const RECORD_WIDTH = 1024;
    const RECORD_HEIGHT = 800;
    let stream = null;
    let detectionOn = false;
    let scanInProgress = false;
    let lastCaptureStartTime = 0;
    let lastSailNumbers = [];
    const storeNumbers = true;
    let storeCaptures = false;
    let sessionId = 'lv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
    let resultsSessionId = sessionId;

    function setFeedback(text, isError) {
        feedbackStatus.textContent = text;
        feedbackStatus.className = 'feedback-status feedback-line' + (isError ? ' error' : '');
    }

    function formatStoredAt(d) {
        var dt = new Date(d);
        return dt.toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
    }

    function loadLastResults() {
        fetch('/api/liveview-results?limit=30')
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var list = data.results || [];
                if (list.length === 0) {
                    feedbackHistory.textContent = 'No stored results yet.';
                    return;
                }
                feedbackHistory.innerHTML = list.map(function (r) {
                    var nums = (r.sail_numbers || []).join(', ') || '—';
                    return '<div class="feedback-history-item">' + formatStoredAt(r.created_at) + ' — ' + nums + '</div>';
                }).join('');
            })
            .catch(function () { feedbackHistory.textContent = 'Could not load stored results.'; });
    }

    function resizeOverlay() {
        var inner = video.closest('.inner');
        if (!inner || !video.videoWidth) return;
        var cw = inner.clientWidth;
        var ch = inner.clientHeight;
        overlay.width = cw;
        overlay.height = ch;
        overlay.style.width = cw + 'px';
        overlay.style.height = ch + 'px';
        drawOverlay();
    }

    function boxFromBounding(b) {
        if (!b || b.length < 8) return null;
        var minX = Math.min(b[0], b[2], b[4], b[6]);
        var minY = Math.min(b[1], b[3], b[5], b[7]);
        var maxX = Math.max(b[0], b[2], b[4], b[6]);
        var maxY = Math.max(b[1], b[3], b[5], b[7]);
        return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }

    function drawOverlay() {
        var ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        if (!lastSailNumbers.length || !video.videoWidth) return;
        var scaleX = overlay.width / video.videoWidth;
        var scaleY = overlay.height / video.videoHeight;
        for (var i = 0; i < lastSailNumbers.length; i++) {
            var s = lastSailNumbers[i];
            var box = boxFromBounding(s.boundingBox);
            if (!box) continue;
            var x = box.x * scaleX;
            var y = box.y * scaleY;
            var w = box.width * scaleX;
            var h = box.height * scaleY;
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.9)';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = 'rgba(0, 200, 255, 0.25)';
            ctx.fillRect(x, y, w, h);
            ctx.font = 'bold ' + Math.max(14, Math.min(24, w / 2)) + 'px sans-serif';
            ctx.fillStyle = '#00d4ff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            var text = String(s.number);
            ctx.strokeText(text, x + 4, y + h - 4);
            ctx.fillText(text, x + 4, y + h - 4);
        }
    }

    function scheduleNextScan() {
        if (!detectionOn) return;
        var elapsed = Date.now() - lastCaptureStartTime;
        var delay = Math.max(0, THROTTLE_MS - elapsed);
        setTimeout(doScan, delay);
    }

    function doScan() {
        if (!stream || !video.videoWidth || !detectionOn || scanInProgress) return;
        scanInProgress = true;
        lastCaptureStartTime = Date.now();
        var w = video.videoWidth;
        var h = video.videoHeight;
        captureCanvas.width = w;
        captureCanvas.height = h;
        var ctx = captureCanvas.getContext('2d');
        ctx.drawImage(video, 0, 0, w, h);

        setFeedback('Scanning..');

        captureCanvas.toBlob(function (blob) {
            if (!blob || !detectionOn) { scanInProgress = false; return; }
            if (storeCaptures) {
                var rw = RECORD_WIDTH;
                var rh = RECORD_HEIGHT;
                var rCanvas = document.createElement('canvas');
                rCanvas.width = rw;
                rCanvas.height = rh;
                var rCtx = rCanvas.getContext('2d');
                rCtx.drawImage(captureCanvas, 0, 0, captureCanvas.width, captureCanvas.height, 0, 0, rw, rh);
                rCanvas.toBlob(function (rBlob) {
                    if (rBlob) {
                        var rFd = new FormData();
                        rFd.append('image', rBlob, 'frame.jpg');
                        rFd.append('sessionId', sessionId);
                        fetch('/api/liveview-frame', { method: 'POST', body: rFd }).catch(function () {});
                    }
                }, 'image/jpeg', 0.8);
            }
            var fd = new FormData();
            fd.append('image', blob, 'frame.jpg');
            fetch('/api/liveview-scan', { method: 'POST', body: fd })
                .then(function (r) {
                    if (!detectionOn) { scanInProgress = false; return r.json(); }
                    return r.json();
                })
                .then(function (data) {
                    if (!detectionOn) { scanInProgress = false; return; }
                    var list = data.sailNumbers || [];
                    lastSailNumbers = list;
                    resizeOverlay();
                    var yy = list.length ? list.length + ' — ' + list.map(function (s) { return s.number; }).join(', ') : '0';
                    setFeedback('Sail Numbers Detected : ' + yy);
                    if (storeNumbers && list.length > 0) {
                        fetch('/api/liveview-store-results', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sailNumbers: list.map(function (s) { return s.number; }), sessionId: resultsSessionId })
                        }).then(function () { loadLastResults(); }).catch(function () {});
                    }
                    scanInProgress = false;
                    scheduleNextScan();
                })
                .catch(function (err) {
                    setFeedback('Scan failed: ' + (err.message || 'Network error'), true);
                    scanInProgress = false;
                    scheduleNextScan();
                });
        }, 'image/jpeg', 0.9);
    }

    function startCamera() {
        return navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
    }

    function startDetection() {
        if (detectionOn) return;
        detectionOn = true;
        resultsSessionId = 'lv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
        detectionBtn.textContent = '■ Stop';
        detectionBtn.classList.remove('start');
        detectionBtn.classList.add('stop');
        detectionBtn.setAttribute('aria-pressed', 'true');
        lastSailNumbers = [];
        setFeedback('—');
        loadLastResults();
        resizeOverlay();
        doScan();
    }

    function stopDetection() {
        detectionOn = false;
        detectionBtn.textContent = '▶ Start';
        detectionBtn.classList.remove('stop');
        detectionBtn.classList.add('start');
        detectionBtn.setAttribute('aria-pressed', 'false');
        lastSailNumbers = [];
        setFeedback('—');
        loadLastResults();
        resizeOverlay();
    }

    storeCapturesBtn.addEventListener('click', function () {
        if (storeCaptures) {
            fetch('/api/liveview-recording-stop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId })
            }).then(function (r) { return r.json(); }).then(function (d) {
                if (d.videoUrl) setFeedback('Recording saved: ' + d.videoUrl, false);
            }).catch(function () {});
        } else {
            sessionId = 'lv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
        }
        storeCaptures = !storeCaptures;
        storeCapturesBtn.textContent = storeCaptures ? 'Save Captures ON' : 'Save Captures OFF';
        storeCapturesBtn.classList.toggle('on', storeCaptures);
        storeCapturesBtn.classList.toggle('off', !storeCaptures);
        storeCapturesBtn.setAttribute('aria-pressed', storeCaptures ? 'true' : 'false');
    });

    detectionBtn.addEventListener('click', function () {
        if (detectionOn) stopDetection();
        else startDetection();
    });

    window.addEventListener('resize', resizeOverlay);

    startCamera()
        .then(function (s) {
            stream = s;
            video.srcObject = s;
            video.onloadedmetadata = function () {
                video.play().catch(function () {});
                resizeOverlay();
            };
        })
        .catch(function (err) {
            setFeedback('Camera error: ' + (err.message || 'Permission denied'), true);
        });
    loadLastResults();
})();
    </script>
</body>
</html>
