<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Sailing - Sailboat Racing Results Database & Sailing Resource Tool</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.ico">
    <meta name="description"
        content="Love Sailing is a sailboat racing results database and sailing resource tool. Access USA race data, sail number scanner, sailing chatbot, AI tools, and live/historic regatta results from Regatta Network and ClubSpot.">
    <meta name="keywords"
        content="sailing, sailboat racing, regatta results, sail number scanner, sailing chatbot, AI sailing tools, Regatta Network, ClubSpot">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Love Sailing - Sailboat Racing Database">
    <meta property="og:description"
        content="Access USA sailboat race data, sail number scanner, sailing chatbot, AI tools, and live/historic regatta results.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lovesailing.ai/">
    <meta property="og:image" content="https://lovesailing.ai/Images/LOVE%20SAILING%20LOGO.JPEG">
    <meta property="og:image:alt" content="Love Sailing Logo">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Love Sailing - Sailboat Racing Database">
    <meta name="twitter:description" content="Access USA sailboat race data, sail number scanner, sailing chatbot, AI tools, and live/historic regatta results.">
    <meta name="twitter:image" content="https://lovesailing.ai/Images/LOVE%20SAILING%20LOGO.JPEG">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020053;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .logo {
            margin-top: 50px;
            max-width: 600px;
            width: 90%;
        }

        .navigation {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
        }

        .nav-item img {
            width: 200px;
            transition: transform 0.3s ease;
        }

        .nav-item img:hover {
            transform: scale(1.1);
        }

        /* Icon card for pages without a custom image */
        .nav-icon-card {
            width: 200px;
            height: 140px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.3s ease, background 0.3s ease;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            letter-spacing: 0.5px;
        }

        .nav-icon-card:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.18);
        }

        .nav-icon-card .icon {
            font-size: 2.8rem;
            line-height: 1;
        }

        /* Tracker group — image header + sub-buttons */
        /* Tracker grouped nav card */
        .nav-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(126,207,255,0.35);
            border-radius: 18px;
            padding: 0 12px 14px;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .nav-group:hover {
            background: rgba(255,255,255,0.11);
        }

        .nav-group-header img {
            width: 190px;
            display: block;
        }

        .nav-group-items {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .nav-sub-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 62px;
            height: 62px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-size: 0.58rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 0.3px;
            transition: background 0.2s ease, transform 0.2s ease;
            line-height: 1.3;
            padding: 6px 4px;
        }

        .nav-sub-btn:hover {
            background: rgba(126,207,255,0.25);
            border-color: rgba(126,207,255,0.5);
            transform: scale(1.08);
        }

        .nav-sub-btn .sub-icon {
            font-size: 1.5rem;
            line-height: 1;
        }

        .tagline {
            margin-top: 50px;
            font-size: 1em;
            color: white;
        }

        /* Mobile menu styling */
        .hamburger-menu {
            display: none;
            cursor: pointer;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background-color: rgba(2, 0, 83, 0.8);
            padding: 10px;
            border-radius: 5px;
        }

        .hamburger-menu span {
            display: block;
            width: 30px;
            height: 3px;
            margin: 6px 0;
            background-color: white;
            transition: all 0.3s ease;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020053;
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .mobile-menu a {
            display: block;
            padding: 20px;
            margin: 10px 0;
            font-size: 1.5em;
            color: white;
            text-decoration: none;
            width: 80%;
            text-align: center;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .mobile-menu a:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .mobile-menu .mobile-group {
            width: 80%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 6px 0;
        }

        .mobile-menu .mobile-group-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            text-align: center;
            padding-bottom: 4px;
        }

        .mobile-menu .mobile-group a {
            width: 100%;
            margin: 0;
            padding: 14px 20px;
            font-size: 1.2em;
        }

        .mobile-menu img {
            width: 80px;
            height: auto;
            margin-bottom: 10px;
        }

        .mobile-menu .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        /* Live View: only show on mobile */
        @media (min-width: 769px) {
            .nav-item-liveview {
                display: none !important;
            }
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            .navigation {
                display: none;
            }

            .hamburger-menu {
                display: block;
            }

            .logo {
                margin-top: 30px;
                max-width: 80%;
            }

            .tagline {
                margin-top: 30px;
                text-align: center;
                padding: 0 20px;
            }
        }
    </style>
</head>

<body>
    <img src="/Images/LOVE%20SAILING%20LOGO.JPEG?v=3" alt="Love Sailing Logo" class="logo">

    <div class="navigation">
        <a href="Chatbot.html" class="nav-item">
            <img src="/Images/Chatbot-icon.jpg?v=2" alt="ChatBot">
        </a>
        <a href="SailScan.html" class="nav-item">
            <img src="/Images/Photos-icon.jpg?v=2" alt="Photo Database">
        </a>
        <a href="LiveView.html" class="nav-item nav-item-liveview">
            <img src="/Images/Photos-icon.jpg?v=2" alt="Live View">
        </a>
        <a href="Find-regatta.html" class="nav-item">
            <img src="/Images/regattasearch_button.png" alt="Find Regatta">
        </a>
        <div class="nav-group">
            <div class="nav-group-header">
                <img src="/Images/Tracker_button.png" alt="Tracker">
            </div>
            <div class="nav-group-items">
                <a href="Tracker.html" class="nav-sub-btn">
                    <span class="sub-icon">📍</span>
                    Web Tracker
                </a>
                <a href="Tracker-dashboard.html" class="nav-sub-btn">
                    <span class="sub-icon">🗺️</span>
                    Track Dashboard
                </a>
                <a href="PiControl.html" class="nav-sub-btn">
                    <span class="sub-icon">🥧</span>
                    Pi Control
                </a>
            </div>
        </div>
        <a href="Shop.html" class="nav-item">
            <img src="/Images/Love%20Sailing%20Shop%20Shopping%20Basket%20Icon.jpg?v=3" alt="Love Sailing Shop">
        </a>
    </div>

    <div class="tagline">

    </div>

    <!-- Hamburger menu icon -->
    <div class="hamburger-menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="close-menu" onclick="toggleMenu()">✕</div>

        <a href="index.html">Home</a>
        <a href="SailScan.html">Photo Database</a>
        <a href="LiveView.html">Live View</a>
        <a href="Find-regatta.html">Find Regatta</a>
        <a href="Chatbot.html">Chatbot</a>
        <div class="mobile-group">
            <div class="mobile-group-label">Tracker</div>
            <a href="Tracker.html">📍 Web Tracker</a>
            <a href="Tracker-dashboard.html">🗺️ Track Dashboard</a>
            <a href="PiControl.html">🥧 Pi Control</a>
        </div>
        <a href="Shop.html">Shop</a>
        <a href="game.html">GAME</a>
    </div>

    <script>
        function toggleMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            if (mobileMenu.style.display === 'flex') {
                mobileMenu.style.display = 'none';
            } else {
                mobileMenu.style.display = 'flex';
            }
        }
    </script>
</body>

</html>
